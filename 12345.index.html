<!DOCTYPE html>
<html>
    <head>
        <title>مشغل جزء قد سمع</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <style>
            /* ===== RESET & BASE ===== */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Segoe UI', 'Varela Round', sans-serif;
                background: #0f0f1a;
                color: #fff;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                transition: background 0.4s, color 0.4s;
                padding: 12px;
            }
            body.light {
                background: #f0f2f5;
                color: #1a1a2e;
            }

            /* ===== CONTAINER ===== */
            .player-wrapper {
                width: 100%;
                max-width: 420px;
                margin: 0 auto;
                position: relative;
            }

            /* ===== MAIN PLAYER CARD ===== */
            .player-card {
                background: linear-gradient(145deg, #1a1a2e, #16213e);
                border-radius: 32px;
                padding: 24px 20px 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
                transition: all 0.4s;
                position: relative;
                overflow: hidden;
            }
            body.light .player-card {
                background: linear-gradient(145deg, #ffffff, #e8ecf1);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            }
            .player-card::before {
                content: '';
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle at 30% 20%, rgba(255, 215, 0, 0.06), transparent 60%);
                pointer-events: none;
            }

            /* ===== HEADER: TITLE & CONTROLS ===== */
            .player-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 18px;
            }
            .player-title {
                font-size: 15px;
                font-weight: 700;
                letter-spacing: 0.5px;
                background: rgba(255, 215, 0, 0.15);
                padding: 6px 16px;
                border-radius: 40px;
                color: #f0c040;
                border: 1px solid rgba(255, 215, 0, 0.15);
            }
            .header-actions {
                display: flex;
                gap: 10px;
            }
            .header-actions button {
                background: rgba(255, 255, 255, 0.06);
                border: none;
                color: #aaa;
                width: 38px;
                height: 38px;
                border-radius: 50%;
                font-size: 18px;
                cursor: pointer;
                transition: 0.3s;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            body.light .header-actions button {
                background: rgba(0, 0, 0, 0.05);
                color: #555;
            }
            .header-actions button:hover {
                background: rgba(255, 215, 0, 0.15);
                color: #f0c040;
                transform: scale(1.05);
            }

            /* ===== ARTWORK ===== */
            .artwork-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 18px;
            }
            .artwork {
                width: 180px;
                height: 180px;
                border-radius: 28px;
                object-fit: cover;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
                border: 2px solid rgba(255, 215, 0, 0.15);
                transition: 0.3s;
                background: #222;
            }
            body.light .artwork {
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            }

            /* ===== SONG INFO ===== */
            .song-info {
                text-align: center;
                margin: 8px 0 12px;
            }
            .song-name {
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 2px;
                color: #fff;
            }
            body.light .song-name {
                color: #1a1a2e;
            }
            .song-artist {
                font-size: 14px;
                color: #aaa;
                font-weight: 400;
            }
            body.light .song-artist {
                color: #666;
            }

            /* ===== PROGRESS BAR ===== */
            .progress-section {
                margin: 10px 0 6px;
            }
            .progress-bar {
                width: 100%;
                height: 6px;
                background: rgba(255, 255, 255, 0.10);
                border-radius: 10px;
                cursor: pointer;
                position: relative;
                transition: height 0.2s;
            }
            body.light .progress-bar {
                background: rgba(0, 0, 0, 0.10);
            }
            .progress-bar:hover {
                height: 8px;
            }
            .progress-fill {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg, #f0c040, #ff8c00);
                border-radius: 10px;
                position: relative;
                transition: width 0.05s linear;
            }
            .progress-fill::after {
                content: '';
                position: absolute;
                right: -6px;
                top: -4px;
                width: 14px;
                height: 14px;
                background: #f0c040;
                border-radius: 50%;
                opacity: 0;
                transition: opacity 0.2s;
                box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
            }
            .progress-bar:hover .progress-fill::after {
                opacity: 1;
            }
            .time-display {
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                color: #888;
                margin-top: 4px;
                font-weight: 500;
                letter-spacing: 0.3px;
            }
            body.light .time-display {
                color: #777;
            }

            /* ===== CONTROLS ROW ===== */
            .controls-row {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 16px;
                margin: 14px 0 10px;
            }
            .controls-row button {
                background: none;
                border: none;
                color: #ddd;
                font-size: 22px;
                cursor: pointer;
                transition: 0.25s;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            body.light .controls-row button {
                color: #444;
            }
            .controls-row button:hover {
                color: #f0c040;
                transform: scale(1.08);
            }
            .controls-row .play-btn {
                background: linear-gradient(135deg, #f0c040, #e6a800);
                color: #1a1a2e;
                width: 58px;
                height: 58px;
                font-size: 28px;
                box-shadow: 0 8px 24px rgba(255, 215, 0, 0.25);
            }
            body.light .controls-row .play-btn {
                box-shadow: 0 8px 24px rgba(255, 215, 0, 0.20);
            }
            .controls-row .play-btn:hover {
                transform: scale(1.06);
                box-shadow: 0 8px 30px rgba(255, 215, 0, 0.35);
            }
            .controls-row .play-btn.playing {
                background: linear-gradient(135deg, #ff6b6b, #ee4444);
                box-shadow: 0 8px 24px rgba(238, 68, 68, 0.25);
            }

            /* ===== VOLUME & BOTTOM ROW ===== */
            .bottom-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }
            body.light .bottom-row {
                border-top: 1px solid rgba(0, 0, 0, 0.06);
            }
            .volume-wrap {
                display: flex;
                align-items: center;
                gap: 8px;
                flex: 1;
            }
            .volume-wrap button {
                background: none;
                border: none;
                color: #aaa;
                font-size: 18px;
                cursor: pointer;
                padding: 4px;
            }
            .volume-slider {
                width: 80px;
                height: 4px;
                -webkit-appearance: none;
                appearance: none;
                background: rgba(255, 255, 255, 0.12);
                border-radius: 10px;
                outline: none;
                transition: 0.2s;
            }
            body.light .volume-slider {
                background: rgba(0, 0, 0, 0.10);
            }
            .volume-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                background: #f0c040;
                border-radius: 50%;
                cursor: pointer;
                box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
            }
            .bottom-actions {
                display: flex;
                gap: 8px;
            }
            .bottom-actions button {
                background: none;
                border: none;
                color: #aaa;
                font-size: 18px;
                cursor: pointer;
                padding: 6px;
                border-radius: 50%;
                transition: 0.25s;
                width: 36px;
                height: 36px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .bottom-actions button:hover {
                color: #f0c040;
                background: rgba(255, 215, 0, 0.08);
            }

            /* ===== PLAYLIST SIDEBAR ===== */
            .playlist-toggle {
                margin-top: 14px;
                text-align: center;
            }
            .playlist-toggle button {
                background: rgba(255, 215, 0, 0.06);
                border: 1px solid rgba(255, 215, 0, 0.10);
                color: #aaa;
                padding: 8px 20px;
                border-radius: 40px;
                font-size: 13px;
                cursor: pointer;
                transition: 0.3s;
                font-weight: 600;
                letter-spacing: 0.5px;
            }
            .playlist-toggle button:hover {
                background: rgba(255, 215, 0, 0.12);
                color: #f0c040;
            }
            body.light .playlist-toggle button {
                background: rgba(0, 0, 0, 0.03);
                border-color: rgba(0, 0, 0, 0.08);
                color: #666;
            }
            body.light .playlist-toggle button:hover {
                background: rgba(0, 0, 0, 0.06);
                color: #e6a800;
            }

            /* ===== PLAYLIST PANEL ===== */
            .playlist-panel {
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
                background: rgba(255, 255, 255, 0.02);
                border-radius: 20px;
                margin-top: 6px;
            }
            body.light .playlist-panel {
                background: rgba(0, 0, 0, 0.02);
            }
            .playlist-panel.open {
                max-height: 340px;
            }
            .playlist-scroll {
                max-height: 300px;
                overflow-y: auto;
                padding: 8px 4px 8px 8px;
            }
            .playlist-scroll::-webkit-scrollbar {
                width: 4px;
            }
            .playlist-scroll::-webkit-scrollbar-thumb {
                background: #f0c040;
                border-radius: 10px;
            }
            .playlist-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 12px;
                border-radius: 16px;
                cursor: pointer;
                transition: 0.25s;
                margin-bottom: 4px;
                border: 1px solid transparent;
            }
            .playlist-item:hover {
                background: rgba(255, 215, 0, 0.04);
                border-color: rgba(255, 215, 0, 0.06);
            }
            body.light .playlist-item:hover {
                background: rgba(0, 0, 0, 0.02);
                border-color: rgba(0, 0, 0, 0.04);
            }
            .playlist-item.active {
                background: rgba(255, 215, 0, 0.08);
                border-color: rgba(255, 215, 0, 0.12);
            }
            body.light .playlist-item.active {
                background: rgba(255, 215, 0, 0.06);
                border-color: rgba(255, 215, 0, 0.10);
            }
            .playlist-item img {
                width: 40px;
                height: 40px;
                border-radius: 12px;
                object-fit: cover;
                flex-shrink: 0;
            }
            .playlist-item .pl-info {
                flex: 1;
                min-width: 0;
            }
            .playlist-item .pl-name {
                font-size: 14px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                color: #eee;
            }
            body.light .playlist-item .pl-name {
                color: #1a1a2e;
            }
            .playlist-item .pl-art {
                font-size: 12px;
                color: #888;
            }
            .playlist-item .pl-dur {
                font-size: 12px;
                color: #666;
                font-weight: 500;
            }
            .playlist-item .pl-play-icon {
                color: #f0c040;
                font-size: 16px;
            }

            /* ===== MINI PLAYER (FLOATING) ===== */
            .mini-player {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: rgba(20, 20, 40, 0.92);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-radius: 60px;
                padding: 10px 20px 10px 14px;
                display: flex;
                align-items: center;
                gap: 14px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.06);
                z-index: 999;
                transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
                opacity: 0;
                pointer-events: none;
                max-width: 90vw;
            }
            body.light .mini-player {
                background: rgba(255, 255, 255, 0.92);
                border-color: rgba(0, 0, 0, 0.04);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
            }
            .mini-player.show {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
                pointer-events: all;
            }
            .mini-player img {
                width: 40px;
                height: 40px;
                border-radius: 30px;
                object-fit: cover;
                flex-shrink: 0;
            }
            .mini-player .mini-info {
                flex: 1;
                min-width: 0;
            }
            .mini-player .mini-name {
                font-size: 13px;
                font-weight: 700;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                color: #fff;
            }
            body.light .mini-player .mini-name {
                color: #1a1a2e;
            }
            .mini-player .mini-art {
                font-size: 11px;
                color: #999;
            }
            .mini-player .mini-controls {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .mini-player .mini-controls button {
                background: none;
                border: none;
                color: #ccc;
                font-size: 20px;
                cursor: pointer;
                padding: 4px;
                transition: 0.2s;
            }
            .mini-player .mini-controls button:hover {
                color: #f0c040;
            }
            .mini-player .mini-close {
                color: #666 !important;
                font-size: 14px !important;
                padding: 0 0 0 6px !important;
            }

            /* ===== RESPONSIVE ===== */
            @media (max-width: 460px) {
                .player-card {
                    padding: 18px 14px 16px;
                    border-radius: 24px;
                }
                .artwork {
                    width: 140px;
                    height: 140px;
                    border-radius: 24px;
                }
                .song-name {
                    font-size: 17px;
                }
                .controls-row .play-btn {
                    width: 50px;
                    height: 50px;
                    font-size: 24px;
                }
                .controls-row {
                    gap: 10px;
                }
                .controls-row button {
                    font-size: 18px;
                    width: 38px;
                    height: 38px;
                }
                .volume-slider {
                    width: 60px;
                }
                .mini-player {
                    padding: 8px 14px 8px 10px;
                    gap: 10px;
                }
                .mini-player img {
                    width: 34px;
                    height: 34px;
                }
            }
            @media (max-width: 360px) {
                .artwork {
                    width: 120px;
                    height: 120px;
                }
                .volume-slider {
                    width: 44px;
                }
                .bottom-row {
                    flex-wrap: wrap;
                    justify-content: center;
                }
            }
        </style>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <div class="player-wrapper">
            <div class="player-card" id="playerCard">
                <!-- HEADER -->
                <div class="player-header">
                    <span class="player-title"><i class="fas fa-music" style="margin-right:6px;"></i> جزء قد سمع</span>
                    <div class="header-actions">
                        <button id="themeToggle" title="الوضع"><i class="fas fa-moon"></i></button>
                        <button id="fullscreenToggle" title="ملء الشاشة"><i class="fas fa-expand"></i></button>
                    </div>
                </div>

                <!-- ARTWORK -->
                <div class="artwork-section">
                    <img class="artwork" id="artworkImg" src="" alt="غلاف">
                </div>

                <!-- SONG INFO -->
                <div class="song-info">
                    <div class="song-name" id="songName">سورة المجادلة</div>
                    <div class="song-artist" id="songArtist">01</div>
                </div>

                <!-- PROGRESS -->
                <div class="progress-section">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">00:00</span>
                        <span id="totalDuration">00:00</span>
                    </div>
                </div>

                <!-- CONTROLS -->
                <div class="controls-row">
                    <button id="shuffleBtn" title="خلط"><i class="fas fa-random"></i></button>
                    <button id="prevBtn" title="السابق"><i class="fas fa-backward"></i></button>
                    <button id="playBtn" class="play-btn" title="تشغيل"><i class="fas fa-play"></i></button>
                    <button id="nextBtn" title="التالي"><i class="fas fa-forward"></i></button>
                    <button id="repeatBtn" title="تكرار"><i class="fas fa-repeat"></i></button>
                </div>

                <!-- BOTTOM ROW -->
                <div class="bottom-row">
                    <div class="volume-wrap">
                        <button id="muteBtn" title="كتم"><i class="fas fa-volume-up"></i></button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
                    </div>
                    <div class="bottom-actions">
                        <button id="downloadBtn" title="تحميل"><i class="fas fa-download"></i></button>
                        <button id="shareBtn" title="مشاركة"><i class="fas fa-share-alt"></i></button>
                    </div>
                </div>

                <!-- PLAYLIST TOGGLE -->
                <div class="playlist-toggle">
                    <button id="playlistToggleBtn"><i class="fas fa-list-ul" style="margin-right:6px;"></i> قائمة التشغيل</button>
                </div>

                <!-- PLAYLIST PANEL -->
                <div class="playlist-panel" id="playlistPanel">
                    <div class="playlist-scroll" id="playlistContainer"></div>
                </div>
            </div>
        </div>

        <!-- MINI PLAYER -->
        <div class="mini-player" id="miniPlayer">
            <img id="miniArt" src="" alt="">
            <div class="mini-info">
                <div class="mini-name" id="miniName">سورة المجادلة</div>
                <div class="mini-art" id="miniArtName">01</div>
            </div>
            <div class="mini-controls">
                <button id="miniPlayBtn"><i class="fas fa-play"></i></button>
                <button id="miniNextBtn"><i class="fas fa-forward"></i></button>
                <button class="mini-close" id="miniCloseBtn"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <script>
            // ============================================================
            //  CONFIG & SONGS
            // ============================================================
            const songs = [
                { name: "سورة المجادلة", art: "01", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/058.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة الحشر", art: "02", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/059.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة الممتحنة", art: "03", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/060.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة الصف", art: "04", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/061.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة الجمعة", art: "05", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/062.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة المنافقون", art: "06", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/063.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة التغابن", art: "07", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/064.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة الطلاق", art: "08", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/065.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" },
                { name: "سورة التحريم", art: "09", url: "https://www.aicpmadih.de/Multimedia/quran/Jouz_Qad_Sami3/066.mp3", img: "https://www.aicpmadih.de/wp-content/uploads/2019/12/q03-1-670x263.jpg", dur: "00:00" }
            ];

            // ============================================================
            //  DOM REFS
            // ============================================================
            const audio = document.getElementById('audioPlayer');
            const playBtn = document.getElementById('playBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const repeatBtn = document.getElementById('repeatBtn');
            const muteBtn = document.getElementById('muteBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalDurationEl = document.getElementById('totalDuration');
            const songNameEl = document.getElementById('songName');
            const songArtistEl = document.getElementById('songArtist');
            const artworkImg = document.getElementById('artworkImg');
            const playlistContainer = document.getElementById('playlistContainer');
            const playlistPanel = document.getElementById('playlistPanel');
            const playlistToggleBtn = document.getElementById('playlistToggleBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const shareBtn = document.getElementById('shareBtn');
            const themeToggle = document.getElementById('themeToggle');
            const fullscreenToggle = document.getElementById('fullscreenToggle');
            const miniPlayer = document.getElementById('miniPlayer');
            const miniArt = document.getElementById('miniArt');
            const miniName = document.getElementById('miniName');
            const miniArtName = document.getElementById('miniArtName');
            const miniPlayBtn = document.getElementById('miniPlayBtn');
            const miniNextBtn = document.getElementById('miniNextBtn');
            const miniCloseBtn = document.getElementById('miniCloseBtn');

            // ============================================================
            //  STATE
            // ============================================================
            let currentIndex = 0;
            let isPlaying = false;
            let isShuffled = false;
            let repeatMode = 'all'; // 'all' | 'one' | 'none'
            let isMuted = false;
            let previousVolume = 0.8;
            let isMiniVisible = false;

            // ============================================================
            //  HELPERS
            // ============================================================
            function formatTime(sec) {
                if (!sec || isNaN(sec)) return '00:00';
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }

            function getSong(index) {
                return songs[index % songs.length];
            }

            function loadSong(index) {
                const song = getSong(index);
                audio.src = song.url;
                audio.load();
                songNameEl.textContent = song.name;
                songArtistEl.textContent = song.art;
                artworkImg.src = song.img;
                miniName.textContent = song.name;
                miniArtName.textContent = song.art;
                miniArt.src = song.img;
                currentIndex = index;
                // Save state
                localStorage.setItem('lastSongIndex', String(index));
                // Auto-play
                if (isPlaying) {
                    audio.play().catch(() => {});
                }
                updatePlaylistActive();
                updateDownloadLink();
            }

            function play() {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayButton();
                    showMiniPlayer();
                }).catch(() => {
                    isPlaying = false;
                    updatePlayButton();
                });
            }

            function pause() {
                audio.pause();
                isPlaying = false;
                updatePlayButton();
            }

            function togglePlay() {
                if (isPlaying) {
                    pause();
                } else {
                    play();
                }
            }

            function nextSong() {
                let next = currentIndex + 1;
                if (isShuffled) {
                    next = Math.floor(Math.random() * songs.length);
                } else if (next >= songs.length) {
                    next = 0;
                }
                loadSong(next);
                if (isPlaying) play();
            }

            function prevSong() {
                let prev = currentIndex - 1;
                if (prev < 0) prev = songs.length - 1;
                loadSong(prev);
                if (isPlaying) play();
            }

            function updatePlayButton() {
                const icon = playBtn.querySelector('i');
                if (isPlaying) {
                    icon.className = 'fas fa-pause';
                    playBtn.classList.add('playing');
                } else {
                    icon.className = 'fas fa-play';
                    playBtn.classList.remove('playing');
                }
                // Mini
                const mIcon = miniPlayBtn.querySelector('i');
                mIcon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
            }

            function updateProgress() {
                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = pct + '%';
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                    if (!totalDurationEl.textContent || totalDurationEl.textContent === '00:00') {
                        totalDurationEl.textContent = formatTime(audio.duration);
                        // Update song duration in list
                        const dur = formatTime(audio.duration);
                        songs[currentIndex].dur = dur;
                        const items = playlistContainer.querySelectorAll('.playlist-item');
                        if (items[currentIndex]) {
                            items[currentIndex].querySelector('.pl-dur').textContent = dur;
                        }
                    }
                }
            }

            function updatePlaylistActive() {
                const items = playlistContainer.querySelectorAll('.playlist-item');
                items.forEach((el, i) => {
                    el.classList.toggle('active', i === currentIndex);
                });
            }

            function updateDownloadLink() {
                const song = getSong(currentIndex);
                const url = song.url.replace('dl=0', 'dl=1');
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = song.name + '.mp3';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };
            }

            function showMiniPlayer() {
                if (!isMiniVisible && isPlaying) {
                    miniPlayer.classList.add('show');
                    isMiniVisible = true;
                }
            }

            function hideMiniPlayer() {
                miniPlayer.classList.remove('show');
                isMiniVisible = false;
            }

            // ============================================================
            //  PLAYLIST RENDER
            // ============================================================
            function renderPlaylist() {
                playlistContainer.innerHTML = '';
                songs.forEach((song, i) => {
                    const div = document.createElement('div');
                    div.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
                    div.innerHTML = `
                        <img src="${song.img}" alt="">
                        <div class="pl-info">
                            <div class="pl-name">${song.name}</div>
                            <div class="pl-art">${song.art}</div>
                        </div>
                        <span class="pl-dur">${song.dur}</span>
                        ${i === currentIndex ? '<span class="pl-play-icon"><i class="fas fa-volume-up"></i></span>' : ''}
                    `;
                    div.addEventListener('click', () => {
                        loadSong(i);
                        if (isPlaying) play();
                        else {
                            isPlaying = true;
                            play();
                        }
                        playlistPanel.classList.remove('open');
                    });
                    playlistContainer.appendChild(div);
                });
            }

            // ============================================================
            //  THEME
            // ============================================================
            function toggleTheme() {
                document.body.classList.toggle('light');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('light')) {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
                localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
            }

            function loadTheme() {
                const t = localStorage.getItem('theme');
                if (t === 'light') {
                    document.body.classList.add('light');
                    themeToggle.querySelector('i').className = 'fas fa-sun';
                } else {
                    document.body.classList.remove('light');
                    themeToggle.querySelector('i').className = 'fas fa-moon';
                }
            }

            // ============================================================
            //  FULLSCREEN
            // ============================================================
            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.() || document.documentElement.webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
                }
            }

            // ============================================================
            //  SHARE
            // ============================================================
            function shareSong() {
                const song = getSong(currentIndex);
                if (navigator.share) {
                    navigator.share({
                        title: song.name,
                        text: `استمع إلى ${song.name} - ${song.art}`,
                        url: song.url
                    }).catch(() => {});
                } else {
                    // Fallback
                    const text = `${song.name} - ${song.art}\n${song.url}`;
                    navigator.clipboard?.writeText(text).then(() => {
                        alert('تم نسخ الرابط والنص إلى الحافظة!');
                    }).catch(() => {
                        prompt('انسخ الرابط:', song.url);
                    });
                }
            }

            // ============================================================
            //  VOLUME
            // ============================================================
            function setVolume(val) {
                audio.volume = Math.min(1, Math.max(0, val));
                volumeSlider.value = audio.volume;
                if (audio.volume === 0) {
                    isMuted = true;
                    muteBtn.querySelector('i').className = 'fas fa-volume-mute';
                } else {
                    isMuted = false;
                    muteBtn.querySelector('i').className = 'fas fa-volume-up';
                }
                localStorage.setItem('volume', String(audio.volume));
            }

            function toggleMute() {
                if (isMuted) {
                    setVolume(previousVolume || 0.5);
                } else {
                    previousVolume = audio.volume || 0.5;
                    setVolume(0);
                }
            }

            // ============================================================
            //  LOAD SAVED STATE
            // ============================================================
            function loadSavedState() {
                const idx = parseInt(localStorage.getItem('lastSongIndex')) || 0;
                const vol = parseFloat(localStorage.getItem('volume')) || 0.8;
                const theme = localStorage.getItem('theme') || 'dark';
                const time = parseFloat(localStorage.getItem('lastTime')) || 0;
                // Theme
                if (theme === 'light') {
                    document.body.classList.add('light');
                    themeToggle.querySelector('i').className = 'fas fa-sun';
                }
                // Song
                loadSong(idx);
                setVolume(vol);
                // Time restore
                audio.currentTime = time;
                // Restore repeat mode from storage
                const rm = localStorage.getItem('repeatMode');
                if (rm) repeatMode = rm;
                updateRepeatIcon();
                // Restore shuffle
                const sh = localStorage.getItem('shuffle');
                if (sh === 'true') {
                    isShuffled = true;
                    shuffleBtn.style.color = '#f0c040';
                }
            }

            function saveCurrentTime() {
                if (audio.duration && audio.currentTime > 0) {
                    localStorage.setItem('lastTime', String(audio.currentTime));
                }
            }

            // ============================================================
            //  REPEAT ICON
            // ============================================================
            function updateRepeatIcon() {
                const icon = repeatBtn.querySelector('i');
                if (repeatMode === 'all') {
                    icon.className = 'fas fa-repeat';
                    repeatBtn.style.color = '#f0c040';
                } else if (repeatMode === 'one') {
                    icon.className = 'fas fa-repeat-1';
                    repeatBtn.style.color = '#f0c040';
                } else {
                    icon.className = 'fas fa-repeat';
                    repeatBtn.style.color = '';
                }
                localStorage.setItem('repeatMode', repeatMode);
            }

            // ============================================================
            //  EVENT LISTENERS
            // ============================================================
            // Play / Pause
            playBtn.addEventListener('click', togglePlay);
            miniPlayBtn.addEventListener('click', togglePlay);

            // Next / Prev
            nextBtn.addEventListener('click', nextSong);
            prevBtn.addEventListener('click', prevSong);
            miniNextBtn.addEventListener('click', nextSong);

            // Shuffle
            shuffleBtn.addEventListener('click', () => {
                isShuffled = !isShuffled;
                shuffleBtn.style.color = isShuffled ? '#f0c040' : '';
                localStorage.setItem('shuffle', String(isShuffled));
            });

            // Repeat
            repeatBtn.addEventListener('click', () => {
                if (repeatMode === 'all') repeatMode = 'one';
                else if (repeatMode === 'one') repeatMode = 'none';
                else repeatMode = 'all';
                updateRepeatIcon();
            });

            // Volume
            volumeSlider.addEventListener('input', (e) => {
                setVolume(parseFloat(e.target.value));
            });
            muteBtn.addEventListener('click', toggleMute);

            // Progress seek
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                if (audio.duration) {
                    audio.currentTime = pct * audio.duration;
                }
            });

            // Audio events
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', () => {
                totalDurationEl.textContent = formatTime(audio.duration);
                songs[currentIndex].dur = formatTime(audio.duration);
                renderPlaylist();
            });
            audio.addEventListener('ended', () => {
                if (repeatMode === 'one') {
                    audio.currentTime = 0;
                    play();
                } else if (repeatMode === 'all' || repeatMode === 'none') {
                    if (currentIndex >= songs.length - 1) {
                        if (repeatMode === 'all') {
                            loadSong(0);
                            play();
                        } else {
                            pause();
                        }
                    } else {
                        nextSong();
                    }
                }
            });
            audio.addEventListener('play', () => {
                isPlaying = true;
                updatePlayButton();
                showMiniPlayer();
            });
            audio.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayButton();
                if (!isPlaying) {
                    // hide mini after delay if paused
                    setTimeout(() => {
                        if (!isPlaying) hideMiniPlayer();
                    }, 3000);
                }
            });

            // Playlist toggle
            playlistToggleBtn.addEventListener('click', () => {
                playlistPanel.classList.toggle('open');
            });

            // Theme
            themeToggle.addEventListener('click', toggleTheme);

            // Fullscreen
            fullscreenToggle.addEventListener('click', toggleFullscreen);

            // Share
            shareBtn.addEventListener('click', shareSong);

            // Mini close
            miniCloseBtn.addEventListener('click', hideMiniPlayer);

            // Save time on page unload
            window.addEventListener('beforeunload', saveCurrentTime);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault();
                    togglePlay(); }
                if (e.code === 'ArrowRight') nextSong();
                if (e.code === 'ArrowLeft') prevSong();
            });

            // ============================================================
            //  INIT
            // ============================================================
            loadTheme();
            loadSavedState();
            renderPlaylist();
            updatePlayButton();
            updateRepeatIcon();
            updateDownloadLink();

            // If audio already has duration (cached)
            if (audio.duration) {
                totalDurationEl.textContent = formatTime(audio.duration);
            }

            // Show mini if playing on load
            if (isPlaying) {
                showMiniPlayer();
            }

            console.log('✅ مشغل جزء قد سمع جاهز!');
        </script>
    </body>
</html>
